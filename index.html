<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>39碼智能立柱系統</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .mode-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; font-size: 15px; border: 2px solid #ccc; border-radius: 5px; cursor: pointer; font-weight: bold; background: #fff; }
        .active-game { background-color: #2980b9 !important; color: white !important; border-color: #2980b9 !important; }
        .active-play { background-color: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        textarea { width: 100%; height: 100px; box-sizing: border-box; border: 2px dashed #bdc3c7; border-radius: 5px; padding: 10px; font-size: 16px; background: #fafafa; }
        .kill-input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #e74c3c; border-radius: 5px; font-size: 16px; font-weight: bold; color: #c0392b; background: #fdf2f2; margin-top: 5px; }
        button.gen-btn { width: 100%; padding: 14px; font-size: 16px; background-color: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .result-box { background: #eef7f2; border-left: 5px solid #27ae60; padding: 15px; margin-top: 15px; position: relative; border-radius: 0 5px 5px 0; }
        .code-output { font-family: monospace; font-size: 16px; background: #2c3e50; color: #2ecc71; padding: 12px; border-radius: 5px; overflow-x: auto; word-break: break-all; margin: 10px 0; font-weight: bold; letter-spacing: 1px; }
        .copy-btn { background: #7f8c8d; color: white; padding: 6px 12px; font-size: 12px; border-radius: 3px; position: absolute; right: 10px; top: 10px; cursor: pointer; }
        .analysis-box { background: #fdfaf2; border-left: 5px solid #f1c40f; padding: 15px; margin-top: 10px; font-size: 14px; line-height: 1.6; border-radius: 0 5px 5px 0; }
    </style>
</head>
<body>

    <h1>📊 39碼全包 雙功能智能立柱系統</h1>
    
    <div class="card">
        <h3>1. 請選擇彩種模式：</h3>
        <div class="mode-select">
            <button id="g-539" class="mode-btn active-game" onclick="setGame('539')">今彩 539 模式</button>
            <button id="g-ttw" class="mode-btn" onclick="setGame('ttw')">加州天天樂 模式</button>
        </div>

        <h3>2. 請選擇立柱玩法：</h3>
        <div class="mode-select">
            <button id="p-3star" class="mode-btn active-play" onclick="setPlay('3star')">三星過關 (10 - 14 - 15 立三柱)</button>
            <button id="p-4star" class="mode-btn" onclick="setPlay('4star')">四星過關 (9 - 10 - 10 - 10 立四柱)</button>
        </div>

        <div style="margin-bottom: 20px;">
            <h3 style="color:#c0392b;">🚫 填入自選不出牌 (刪除號)：</h3>
            <p style="font-size:13px; color:#7f8c8d; margin-top:-10px;">(若無請保持空白，多個號碼請用空白隔開。例：04 18)</p>
            <input type="text" id="kill-input" class="kill-input" placeholder="請輸入想排除的號碼...">
        </div>

        <h3>3. 請貼上歷史開獎號碼 (最新一期放第一行)：</h3>
        <textarea id="history-input" placeholder="請貼上開獎號碼，支援空白或逗號區隔..."></textarea>
        
        <button class="gen-btn" onclick="processData()">⚡ 生成兩組「自動排除不出牌」黃金立柱</button>
    </div>

    <div class="card" id="result-section" style="display:none;">
        <h3>🔮 智慧分柱生成結果</h3>
        <div id="personality-desc" style="margin-bottom: 15px; font-weight: bold;"></div>
        
        <!-- 第一組 -->
        <div class="result-box">
            <h4>第一組：常態主攻型 (鎖定當前盤口強勢軌跡)</h4>
            <div class="code-output" id="out-1"></div>
            <button class="copy-btn" onclick="copyText('out-1')">複製</button>
        </div>
        <div class="analysis-box">
            <strong>📋 第一組 第 1 柱 戰術定位：</strong>
            <div id="analysis-text-1" style="margin-top:8px;"></div>
        </div>

        <!-- 第二組 -->
        <div class="result-box" style="border-left-color: #9b59b6; margin-top:30px;">
            <h4>第二組：戰術防守型 (專防冷熱大交替變盤)</h4>
            <div class="code-output" id="out-2"></div>
            <button class="copy-btn" onclick="copyText('out-2')">複製</button>
        </div>
        <div class="analysis-box" style="border-left-color: #9b59b6;">
            <strong>📋 第二組 第 1 柱 戰術定位：</strong>
            <div id="analysis-text-2" style="margin-top:8px;"></div>
        </div>
    </div>

    <script>
        var currentGame = '539';
        var currentPlay = '3star';

        function setGame(game) {
            currentGame = game;
            if (game === '539') {
                document.getElementById('g-539').className = "mode-btn active-game";
                document.getElementById('g-ttw').className = "mode-btn";
            } else {
                document.getElementById('g-539').className = "mode-btn";
                document.getElementById('g-ttw').className = "mode-btn active-game";
            }
        }

        function setPlay(play) {
            currentPlay = play;
            if (play === '3star') {
                document.getElementById('p-3star').className = "mode-btn active-play";
                document.getElementById('p-4star').className = "mode-btn";
            } else {
                document.getElementById('p-3star').className = "mode-btn";
                document.getElementById('p-4star').className = "mode-btn active-play";
            }
        }

        function processData() {
            var text = document.getElementById('history-input').value.trim();
            if (!text) { alert("請先貼上歷史開獎號碼！"); return; }
            
            var matches = text.match(/\d+/g);
            if (!matches || matches.length < 5) { alert("請輸入有效的開獎歷史號碼！"); return; }

            // 1. 讀取自選不出牌
            var killText = document.getElementById('kill-input').value.trim();
            var killMatches = killText.match(/\d+/g) || [];
            var killList = [];
            for (var i = 0; i < killMatches.length; i++) {
                var v = parseInt(killMatches[i], 10);
                if (v >= 1 && v <= 39 && killList.indexOf(v) === -1) {
                    killList.push(v);
                }
            }

            // 2. 統計歷史次數
            var numCounts = [];
            for (var i = 0; i <= 40; i++) { numCounts.push(0); }
            
            var lastPeriodNums = [];
            for (var i = 0; i < Math.min(5, matches.length); i++) { 
                lastPeriodNums.push(parseInt(matches[i], 10)); 
            }
            
            for (var i = 0; i < matches.length; i++) {
                var val = parseInt(matches[i], 10);
                if (val >= 1 && val <= 39) { numCounts[val]++; }
            }

            // 3. 計算冷熱得分
            var scores1 = [], scores2 = [];
            for (var i = 0; i <= 40; i++) { scores1.push(0); scores2.push(0); }
            
            for (var i = 1; i <= 39; i++) {
                var baseCount = numCounts[i];
                scores1[i] = baseCount * 10;
                if (currentGame === 'ttw') {
                    if (lastPeriodNums.indexOf(i) !== -1) { scores1[i] += 25; }
                    if (i >= 20) { scores1[i] += 8; }
                } else {
                    if (lastPeriodNums.indexOf(i) !== -1) { scores1[i] -= 15; }
                }

                if (currentPlay === '4star') {
                    scores2[i] = (25 - baseCount) * 10 + (i % 10); 
                } else {
                    scores2[i] = (30 - baseCount) * 10;
                    if (currentGame === 'ttw' && i >= 15 && i <= 30) { scores2[i] += 15; }
                    if (currentGame === '539' && lastPeriodNums.indexOf(i) === -1 && baseCount === 0) { scores2[i] += 30; }
                }
            }

            // 4. 排除不出牌並整理清單
            var list1 = [], list2 = [];
            for (var i = 1; i <= 39; i++) {
                if (killList.indexOf(i) === -1) {
                    list1.push({num: i, score: scores1[i]});
                    list2.push({num: i, score: scores2[i]});
                }
            }
            list1.sort(function(a, b) { return b.score - a.score; });
            list2.sort(function(a, b) { return b.score - a.score; });

            var sorted1 = [], sorted2 = [];
            for (var i = 0; i < list1.length; i++) { sorted1.push(list1[i].num); }
            for (var i = 0; i < list2.length; i++) { sorted2.push(list2[i].num); }

            // 補齊可能缺少的號碼（防呆安全鎖）
            for (var i = 1; i <= 39; i++) {
                if (killList.indexOf(i) === -1 && sorted1.indexOf(i) === -1) { sorted1.push(i); }
                if (killList.indexOf(i) === -1 && sorted2.indexOf(i) === -1) { sorted2.push(i); }
            }

            // 5. 格式化字串函數
            function padZero(n) { return n < 10 ? '0' + n : '' + n; }
            function formatColumn(arr) {
                var tmp = [];
                for (var i = 0; i < arr.length; i++) { tmp.push(arr[i]); }
                tmp.sort(function(a, b) { return a - b; });
                var strArr = [];
                for (var i = 0; i < tmp.length; i++) { strArr.push(padZero(tmp[i])); }
                return strArr.join(',');
            }
            function formatSpace(arr) {
                var tmp = [];
                for (var i = 0; i < arr.length; i++) { tmp.push(arr[i]); }
                tmp.sort(function(a, b) { return a - b; });
                var strArr = [];
                for (var i = 0; i < tmp.length; i++) { strArr.push(padZero(tmp[i])); }
                return strArr.join(' ');
            }

            // 6. 依據玩法切塊輸出
            var outStr1 = "", outStr2 = "";
            if (currentPlay === '3star') {
