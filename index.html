<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>539 / 天天樂 智慧立柱系統</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .mode-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; font-size: 15px; border: 2px solid #ccc; border-radius: 5px; cursor: pointer; font-weight: bold; background: #fff; transition: 0.2s; }
        .mode-btn.active-game { background-color: #2980b9; color: white; border-color: #2980b9; }
        .mode-btn.active-play { background-color: #e74c3c; color: white; border-color: #e74c3c; }
        textarea { width: 100%; height: 100px; box-sizing: border-box; border: 2px dashed #bdc3c7; border-radius: 5px; padding: 10px; font-size: 16px; background: #fafafa; }
        .kill-input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #e74c3c; border-radius: 5px; font-size: 16px; font-weight: bold; color: #c0392b; background: #fdf2f2; margin-top: 5px; }
        button.gen-btn { width: 100%; padding: 14px; font-size: 16px; background-color: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button.gen-btn:hover { background-color: #d35400; }
        .result-box { background: #eef7f2; border-left: 5px solid #27ae60; padding: 15px; margin-top: 15px; position: relative; border-radius: 0 5px 5px 0; }
        .code-output { font-family: monospace; font-size: 16px; background: #2c3e50; color: #2ecc71; padding: 12px; border-radius: 5px; overflow-x: auto; word-break: break-all; margin: 10px 0; font-weight: bold; letter-spacing: 1px; }
        .copy-btn { background: #7f8c8d; color: white; padding: 6px 12px; font-size: 12px; border-radius: 3px; position: absolute; right: 10px; top: 10px; cursor: pointer; }
        .analysis-box { background: #fdfaf2; border-left: 5px solid #f1c40f; padding: 15px; margin-top: 10px; font-size: 14px; line-height: 1.6; border-radius: 0 5px 5px 0; }
        .personality-tag { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>📊 39碼全包 雙功能智能立柱系統 (終極修復版)</h1>
    
    <div class="card">
        <h3>1. 請選擇彩種模式：</h3>
        <div class="mode-select">
            <button id="g-539" class="mode-btn active-game" onclick="setGame('539')">今彩 539 模式</button>
            <button id="g-ttw" class="mode-btn" onclick="setGame('ttw')">加州天天樂 模式</button>
        </div>

        <h3>2. 請選擇立柱玩法：</h3>
        <div class="mode-select">
            <button id="p-3star" class="mode-btn active-play" onclick="setPlay('3star')">三星過關 (10 - 14 - 15 立三柱)</button>
            <button id="p-4star" class="mode-btn" onclick="setPlay('4star')">四星過關 (9 - 10 - 10 - 10 立四柱)</button>
        </div>

        <div id="kill-section" style="margin-bottom: 20px;">
            <h3 style="color:#c0392b;">🚫 填入自選不出牌 (刪除號)：</h3>
            <p style="font-size:13px; color:#7f8c8d; margin-top:-10px;">(若無則保持空白，支援空白或逗號隔開。例：04 18 35)</p>
            <input type="text" id="kill-input" class="kill-input" placeholder="請輸入今晚想刪除的冷碼或冥燈號...">
        </div>

        <h3>3. 請貼上歷史開獎號碼 (最新一期放第一行)：</h3>
        <textarea id="history-input" placeholder="直接貼上號碼即可，支援空白或逗號區隔..."></textarea>
        
        <button class="gen-btn" onclick="processData()">⚡ 生成兩組「自動排除不出牌」黃金立柱</button>
    </div>

    <div class="card" id="result-section" style="display:none;">
        <h3>🔮 智慧分柱生成結果</h3>
        <div id="personality-desc" style="margin-bottom: 15px;"></div>
        
        <!-- 第一組 -->
        <div class="result-box">
            <h4>第一組：常態主攻型 (鎖定當前盤口強勢軌跡)</h4>
            <div class="code-output" id="out-1"></div>
            <button class="copy-btn" onclick="copyText('out-1')">複製</button>
        </div>
        <div class="analysis-box">
            <strong>📋 第一組 第 1 柱 戰術定位：</strong>
            <div id="analysis-text-1" style="margin-top:8px;"></div>
        </div>

        <!-- 第二組 -->
        <div class="result-box" style="border-left-color: #9b59b6; margin-top:30px;">
            <h4>第二組：戰術防守型 (專防冷熱大交替變盤)</h4>
            <div class="code-output" id="out-2"></div>
            <button class="copy-btn" onclick="copyText('out-2')">複製</button>
        </div>
        <div class="analysis-box" style="border-left-color: #9b59b6;">
            <strong>📋 第二組 第 1 柱 戰術定位：</strong>
            <div id="analysis-text-2" style="margin-top:8px;"></div>
        </div>
    </div>

    <script>
        let currentGame = '539';
        let currentPlay = '3star';

        function setGame(game) {
            currentGame = game;
            document.getElementById('g-539').className = game === '539' ? "mode-btn active-game" : "mode-btn";
            document.getElementById('g-ttw').className = game === 'ttw' ? "mode-btn active-game" : "mode-btn";
        }

        function setPlay(play) {
            currentPlay = play;
            document.getElementById('p-3star').className = play === '3star' ? "mode-btn active-play" : "mode-btn";
            document.getElementById('p-4star').className = play === '4star' ? "mode-btn active-play" : "mode-btn";
        }

        function processData() {
            const text = document.getElementById('history-input').value.trim();
            const matches = text.match(/\d+/g);
            if (!matches || matches.length < 5) { alert("請輸入有效的開獎歷史號碼！"); return; }

            // 1. 讀取刪除號
            const killText = document.getElementById('kill-input').value.trim();
            const killMatches = killText.match(/\d+/g) || [];
            let killList = killMatches.map(x => parseInt(x, 10));

            // 2. 統計歷史開獎次數
            let numCounts = Array(40).fill(0);
            let lastPeriodNums = [];
            for(let i=0; i<Math.min(5, matches.length); i++) { lastPeriodNums.push(parseInt(matches[i], 10)); }
            matches.forEach(m => { let val = parseInt(m, 10); if (val >= 1 && val <= 39) numCounts[val]++; });

            // 3. 計算冷熱個性評分
            let scores1 = Array(40).fill(0), scores2 = Array(40).fill(0);
            for(let i=1; i<=39; i++) {
                let baseCount = numCounts[i];
                scores1[i] = baseCount * 10;
                if (currentGame === 'ttw') {
                    if (lastPeriodNums.includes(i)) scores1[i] += 25;
                    if (i >= 20) scores1[i] += 8;
                } else {
                    if (lastPeriodNums.includes(i)) scores1[i] -= 15;
                }

                if (currentPlay === '4star') {
                    scores2[i] = (25 - baseCount) * 10 + (i % 10); 
                } else {
                    scores2[i] = (30 - baseCount) * 10;
                    if (currentGame === 'ttw' && i >= 15 && i <= 30) scores2[i] += 15;
                    if (currentGame === '539' && !lastPeriodNums.includes(i) && baseCount === 0) scores2[i] += 30;
                }
            }

            // 4. 過濾掉不出牌，並依據分數排序
            let list1 = [], list2 = [];
            for(let i=1; i<=39; i++) {
                if (!killList.includes(i)) {
                    list1.push({num: i, score: scores1[i]});
                    list2.push({num: i, score: scores2[i]});
                }
            }
            list1.sort((a,b) => b.score - a.score);
            list2.sort((a,b) => b.score - a.score);

            let sorted1 = list1.map(x => x.num);
            let sorted2 = list2.map(x => x.num);

            // 5. 格式化輸出輔助
            const fmt = (n) => String(n).padStart(2, '0');
            const formatColumn = (arr) => arr.sort((a,b)=>a-b).map(fmt).join(',');

            // 6. 分柱核心邏輯：依照剩餘可用的號碼，精準切塊填滿限制
            let outStr1 = "", outStr2 = "";
            let gameTitle = currentGame === '539' ? '今彩 539' : '加州天天樂';
            let playTitle = currentPlay === '3star' ? '三星過關 (10-14-15)' : '四星過關 (9-10-10-10)';
            let colorTag = currentGame === '539' ? '#27ae60' : '#2980b9';

            if (currentPlay === '3star') {
                // 三星分配：10支, 14支, 15支
                let c1_p1 = sorted1.slice(0, 10);
                let c1_p2 = sorted1.slice(10, 24);
                let c1_p3 = sorted1.slice(24);
                outStr1 = formatColumn(c1_p1) + "+" + formatColumn(c1_p2) + "+" + formatColumn(c1_p3);

                let c2_p1 = sorted2.slice(0, 10);
                let c2_p2 = sorted2.slice(10, 24);
                let c2_p3 = sorted2.slice(24);
                outStr2 = formatColumn(c2_p1) + "+" + formatColumn(c2_p2) + "+" + formatColumn(c2_p3);

                document.getElementById('analysis-text-1').innerHTML = `本柱包含：<b style="color:red;">${formatColumn(c1_p1).replace(/,/g, ' ')}</b><br>🎯 專攻排除後的頂級熱碼，強力防守三星生死門。`;
                document.getElementById('analysis-text-2').innerHTML = `本柱包含：<b style="color:purple;">${formatColumn(c2_p1).replace(/,/g, ' ')}</b><br>🛡️ 專攻排除後的次熱及冷號反彈，防範盤口突然熄火大轉變。`;
            } else {
                // 四星分配：9支, 10支, 10支, 10支 (若因排除導致不夠39顆，slice會自動處理剩餘元素，安全不卡死)
                let c1_p1 = sorted1.slice(0, 9);
                let c1_p2 = sorted1.slice(9, 19);
                let c1_p3 = sorted1.slice(19, 29);
                let c1_p4 = sorted1.slice(29);
                outStr1 = formatColumn(c1_p1) + "+" + formatColumn(c1_p2) + "+" + formatColumn(c1_p3) + "+" + formatColumn(c1_p4);

                let c2_p1 = sorted2.slice(0, 9);
                let c2_p2 = sorted2.slice(9, 19);
                let c2_p3 = sorted2.slice(19, 29);
                let c2_p4 = sorted2.slice(29);
